<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Typing Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }
        .rtl {
            direction: rtl;
        }
        .ltr {
            direction: ltr;
        }
        .letter-box {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex flex-col items-center justify-center p-4 md:p-8 select-none overflow-x-hidden transition-colors duration-500" id="body-bg">

    <!-- Top Navigation -->
    <div class="w-full max-w-2xl flex justify-between items-center mb-6 bg-white/80 backdrop-blur-md p-4 rounded-3xl shadow-lg border border-white">
        <button id="lang-toggle" class="flex items-center gap-3 bg-gradient-to-br from-indigo-500 to-purple-600 text-white px-5 py-2.5 rounded-2xl font-bold shadow-indigo-200 shadow-lg hover:scale-105 active:scale-95 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            <span id="lang-text">Switch to Hebrew</span>
        </button>

        <div class="flex items-center gap-3 bg-amber-400 text-amber-900 px-6 py-2.5 rounded-2xl font-black text-xl shadow-amber-200 shadow-lg border-b-4 border-amber-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            <span id="score-display">0</span>
        </div>
    </div>

    <!-- Main Game Card -->
    <div class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl p-6 md:p-10 flex flex-col items-center relative border-b-[16px] border-slate-200 overflow-hidden" id="game-card">
        
        <!-- Success Overlay -->
        <div id="success-overlay" class="absolute inset-0 bg-emerald-500/95 flex flex-col items-center justify-center z-40 text-white hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="yellow" stroke="yellow" class="animate-bounce"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <h2 id="success-msg" class="text-6xl font-black mt-4 tracking-tighter drop-shadow-md italic">AMAZING!</h2>
        </div>

        <!-- Image Container -->
        <div class="w-full aspect-square max-w-[320px] bg-indigo-50/50 rounded-[2.5rem] mb-8 flex items-center justify-center relative shadow-inner group overflow-hidden">
            <div id="loader" class="flex flex-col items-center gap-4 hidden">
                <svg class="w-16 h-16 text-indigo-400 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <div id="loader-text" class="bg-indigo-100 px-4 py-1 rounded-full text-indigo-400 text-xs font-black tracking-widest uppercase">Thinking...</div>
            </div>
            <img id="word-image" src="" alt="word" class="w-full h-full object-contain p-8 drop-shadow-xl transform group-hover:scale-110 transition-transform duration-500 hidden">
        </div>

        <!-- Word Boxes Container -->
        <div id="word-container" class="flex flex-wrap justify-center gap-3 md:gap-4 mb-10">
            <!-- Letters injected here -->
        </div>

        <!-- Helper Text -->
        <div class="bg-slate-50 px-6 py-3 rounded-2xl flex items-center gap-3 text-slate-400 border border-slate-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></svg>
            <span id="helper-text" class="text-xs font-bold uppercase tracking-widest">Find the keys on your keyboard</span>
        </div>
    </div>

    <!-- Skip Button -->
    <div class="mt-8">
        <button id="skip-btn" class="bg-white hover:bg-slate-50 text-slate-500 px-10 py-4 rounded-3xl font-black transition-all active:scale-95 shadow-lg flex items-center gap-3 border-2 border-slate-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            <span id="skip-text">SKIP WORD</span>
        </button>
    </div>

    <!-- Achievement Dots -->
    <div id="dots-container" class="mt-auto py-10 flex gap-2 flex-wrap justify-center max-w-xl opacity-40">
        <!-- Dots injected here -->
    </div>

    <script>
        const WORD_DATABASE = {
            en: [
                { word: 'apple', prompt: 'a red apple' }, { word: 'bear', prompt: 'a fuzzy brown bear' },
                { word: 'cat', prompt: 'a cute kitten' }, { word: 'dog', prompt: 'a happy puppy' },
                { word: 'duck', prompt: 'a yellow rubber duck' }, { word: 'elephant', prompt: 'a cute baby elephant' },
                { word: 'fish', prompt: 'a bright orange goldfish' }, { word: 'frog', prompt: 'a green jumping frog' },
                { word: 'goat', prompt: 'a small farm goat' }, { word: 'horse', prompt: 'a brown pony' },
                { word: 'lion', prompt: 'a majestic lion' }, { word: 'mouse', prompt: 'a tiny grey mouse' },
                { word: 'owl', prompt: 'a wise forest owl' }, { word: 'pig', prompt: 'a pink farm pig' },
                { word: 'rabbit', prompt: 'a white fluffy rabbit' }, { word: 'shark', prompt: 'a cool blue shark' },
                { word: 'snake', prompt: 'a colorful friendly snake' }, { word: 'tiger', prompt: 'a striped tiger' },
                { word: 'whale', prompt: 'a big blue whale' }, { word: 'zebra', prompt: 'a black and white zebra' },
                { word: 'bird', prompt: 'a blue songbird' }, { word: 'sheep', prompt: 'a fluffy white sheep' },
                { word: 'monkey', prompt: 'a playful monkey' }, { word: 'giraffe', prompt: 'a tall giraffe' },
                { word: 'turtle', prompt: 'a slow green turtle' }, { word: 'panda', prompt: 'a black and white panda' },
                { word: 'crab', prompt: 'a red beach crab' }, { word: 'bee', prompt: 'a fuzzy bumblebee' },
                { word: 'ant', prompt: 'a tiny red ant' }, { word: 'camel', prompt: 'a desert camel' },
                { word: 'ball', prompt: 'a soccer ball' }, { word: 'bike', prompt: 'a colorful bicycle' },
                { word: 'boat', prompt: 'a sailing boat' }, { word: 'book', prompt: 'an open storybook' },
                { word: 'box', prompt: 'a cardboard box' }, { word: 'cake', prompt: 'a birthday cake with candles' },
                { word: 'car', prompt: 'a red toy car' }, { word: 'chair', prompt: 'a wooden chair' },
                { word: 'cloud', prompt: 'a fluffy white cloud' }, { word: 'cup', prompt: 'a blue coffee cup' },
                { word: 'door', prompt: 'a bright yellow door' }, { word: 'drum', prompt: 'a musical drum' },
                { word: 'egg', prompt: 'a white egg in a nest' }, { word: 'fire', prompt: 'a cozy campfire' },
                { word: 'flower', prompt: 'a pretty red flower' }, { word: 'fork', prompt: 'a silver fork' },
                { word: 'gift', prompt: 'a wrapped present box' }, { word: 'glass', prompt: 'a glass of water' },
                { word: 'hat', prompt: 'a funny party hat' }, { word: 'house', prompt: 'a cozy little house' },
                { word: 'ice', prompt: 'ice cubes' }, { word: 'jar', prompt: 'a glass honey jar' },
                { word: 'key', prompt: 'a shiny gold key' }, { word: 'kite', prompt: 'a flying diamond kite' },
                { word: 'lamp', prompt: 'a desk lamp' }, { word: 'leaf', prompt: 'a green maple leaf' },
                { word: 'milk', prompt: 'a carton of fresh milk' }, { word: 'moon', prompt: 'a glowing crescent moon' },
                { word: 'net', prompt: 'a butterfly net' }, { word: 'nose', prompt: 'a funny nose' },
                { word: 'pen', prompt: 'a blue ink pen' }, { word: 'plane', prompt: 'a white airplane' },
                { word: 'rain', prompt: 'rain drops' }, { word: 'ring', prompt: 'a diamond ring' },
                { word: 'road', prompt: 'a long winding road' }, { word: 'rock', prompt: 'a smooth grey rock' },
                { word: 'rope', prompt: 'a coiled rope' }, { word: 'ship', prompt: 'a big cruise ship' },
                { word: 'shoe', prompt: 'a blue sneaker' }, { word: 'sky', prompt: 'a clear blue sky' },
                { word: 'snow', prompt: 'a white snowflake' }, { word: 'soap', prompt: 'a bar of soap' },
                { word: 'spoon', prompt: 'a silver spoon' }, { word: 'star', prompt: 'a yellow five-point star' },
                { word: 'sun', prompt: 'a bright happy sun' }, { word: 'table', prompt: 'a kitchen table' },
                { word: 'tent', prompt: 'a camping tent' }, { word: 'toy', prompt: 'a pile of toys' },
                { word: 'train', prompt: 'a toy steam train' }, { word: 'tree', prompt: 'a big oak tree' },
                { word: 'van', prompt: 'a white delivery van' }, { word: 'vest', prompt: 'a yellow life vest' },
                { word: 'watch', prompt: 'a wrist watch' }, { word: 'wind', prompt: 'wind blowing leaves' },
                { word: 'yard', prompt: 'a green grassy yard' }, { word: 'yoyo', prompt: 'a red yoyo toy' }
            ],
            he: [
                { word: 'אריה', prompt: 'majestic lion' }, { word: 'דוב', prompt: 'brown bear' },
                { word: 'חתול', prompt: 'cute cat' }, { word: 'כלב', prompt: 'friendly dog' },
                { word: 'פיל', prompt: 'gray elephant' }, { word: 'גמל', prompt: 'desert camel' },
                { word: 'חמור', prompt: 'donkey' }, { word: 'סוס', prompt: 'brown horse' },
                { word: 'פרה', prompt: 'spotted cow' }, { word: 'כבשה', prompt: 'white sheep' },
                { word: 'עז', prompt: 'farm goat' }, { word: 'תרנגול', prompt: 'rooster' },
                { word: 'ברווז', prompt: 'yellow duck' }, { word: 'ציפור', prompt: 'flying bird' },
                { word: 'נשר', prompt: 'eagle' }, { word: 'ינשוף', prompt: 'owl' },
                { word: 'נחש', prompt: 'green snake' }, { word: 'צב', prompt: 'turtle' },
                { word: 'צפרדע', prompt: 'green frog' }, { word: 'דג', prompt: 'goldfish' },
                { word: 'לוויתן', prompt: 'blue whale' }, { word: 'כריש', prompt: 'shark' },
                { word: 'קוף', prompt: 'monkey' }, { word: 'זברה', prompt: 'zebra' },
                { word: 'ארנב', prompt: 'white bunny rabbit' }, { word: 'עכבר', prompt: 'little mouse' },
                { word: 'נמלה', prompt: 'tiny ant' }, { word: 'דבורה', prompt: 'honey bee' },
                { word: 'פרפר', prompt: 'colorful butterfly' }, { word: 'עכביש', prompt: 'black spider' },
                { word: 'בית', prompt: 'red house' }, { word: 'כדור', prompt: 'soccer ball' },
                { word: 'שמש', prompt: 'yellow sun' }, { word: 'ענן', prompt: 'white fluffy cloud' },
                { word: 'עץ', prompt: 'green leafy tree' }, { word: 'פרח', prompt: 'pretty flower' },
                { word: 'מים', prompt: 'glass of water' }, { word: 'לחם', prompt: 'loaf of bread' },
                { word: 'חלב', prompt: 'carton of milk' }, { word: 'גבינה', prompt: 'yellow cheese' },
                { word: 'תפוח', prompt: 'red apple' }, { word: 'בננה', prompt: 'yellow banana' },
                { word: 'ענבים', prompt: 'purple grapes' }, { word: 'לימון', prompt: 'yellow lemon' },
                { word: 'אבטיח', prompt: 'watermelon' }, { word: 'גלידה', prompt: 'ice cream cone' },
                { word: 'ספר', prompt: 'open book' }, { word: 'מכתב', prompt: 'envelope' },
                { word: 'שולחן', prompt: 'wooden table' }, { word: 'כיסא', prompt: 'wooden chair' },
                { word: 'מיטה', prompt: 'cozy bed' }, { word: 'חלון', prompt: 'glass window' },
                { word: 'דלת', prompt: 'brown door' }, { word: 'מפתח', prompt: 'gold key' },
                { word: 'מנורה', prompt: 'desk lamp' }, { word: 'טלפון', prompt: 'old telephone' },
                { word: 'שעון', prompt: 'clock' }, { word: 'בובה', prompt: 'doll' },
                { word: 'רכבת', prompt: 'toy train' }, { word: 'מטוס', prompt: 'airplane' },
                { word: 'סירה', prompt: 'small boat' }, { word: 'אוטו', prompt: 'red car' },
                { word: 'אופניים', prompt: 'bicycle' }, { word: 'כובע', prompt: 'sun hat' },
                { word: 'חולצה', prompt: 'blue t-shirt' }, { word: 'מכנס', prompt: 'pants' },
                { word: 'נעל', prompt: 'shoe' }, { word: 'גרב', prompt: 'sock' },
                { word: 'תיק', prompt: 'backpack' }, { word: 'כסף', prompt: 'coins' },
                { word: 'סכין', prompt: 'knife' }, { word: 'כף', prompt: 'spoon' },
                { word: 'צלחת', prompt: 'white plate' }, { word: 'כוס', prompt: 'cup' },
                { word: 'מלח', prompt: 'salt shaker' }, { word: 'סוכר', prompt: 'sugar bowl' },
                { word: 'דבש', prompt: 'honey pot' }, { word: 'ביצה', prompt: 'boiled egg' },
                { word: 'מרק', prompt: 'bowl of soup' }, { word: 'אורז', prompt: 'bowl of rice' },
                { word: 'ירח', prompt: 'crescent moon' }, { word: 'כוכב', prompt: 'star' },
                { word: 'אבן', prompt: 'stone' }, { word: 'חול', prompt: 'sand' },
                { word: 'ים', prompt: 'ocean waves' }, { word: 'נהר', prompt: 'river' }
            ]
        };

        let currentLang = 'en';
        let currentWordObj = null;
        let typedCount = 0;
        let score = 0;
        let isSuccess = false;
        let isLoading = false;
        const apiKey = ""; // Set by environment

        // DOM Elements
        const wordContainer = document.getElementById('word-container');
        const wordImage = document.getElementById('word-image');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const scoreDisplay = document.getElementById('score-display');
        const successOverlay = document.getElementById('success-overlay');
        const langToggle = document.getElementById('lang-toggle');
        const langText = document.getElementById('lang-text');
        const bodyBg = document.getElementById('body-bg');
        const skipBtn = document.getElementById('skip-btn');
        const skipText = document.getElementById('skip-text');
        const helperText = document.getElementById('helper-text');
        const dotsContainer = document.getElementById('dots-container');
        const successMsg = document.getElementById('success-msg');

        async function generateImage(prompt) {
            isLoading = true;
            loader.classList.remove('hidden');
            wordImage.classList.add('hidden');
            
            let retries = 5;
            let delay = 1000;

            while (retries > 0) {
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: { prompt: `A single, cute, high-quality cartoon illustration of ${prompt}, isolated on a clean white background, vibrant colors, child-friendly style, 3D claymation look.` },
                                parameters: { sampleCount: 1 }
                            })
                        }
                    );

                    if (!response.ok) throw new Error('API Error');
                    
                    const data = await response.json();
                    if (data.predictions?.[0]) {
                        wordImage.src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                        wordImage.classList.remove('hidden');
                        loader.classList.add('hidden');
                        isLoading = false;
                        return;
                    }
                } catch (err) {
                    retries--;
                    if (retries === 0) break;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
            
            // Fallback if all retries fail
            loaderText.innerText = currentLang === 'en' ? "Can't see image..." : "לא מוצא תמונה...";
            isLoading = false;
        }

        function startNewWord() {
            const list = WORD_DATABASE[currentLang];
            let newWord = list[Math.floor(Math.random() * list.length)];
            
            // Prevent same word twice
            if (currentWordObj && newWord.word === currentWordObj.word) {
                newWord = list[Math.floor(Math.random() * list.length)];
            }

            currentWordObj = newWord;
            typedCount = 0;
            isSuccess = false;
            successOverlay.classList.add('hidden');
            
            renderWord();
            generateImage(currentWordObj.prompt);
        }

        function renderWord() {
            wordContainer.innerHTML = '';
            const letters = currentWordObj.word.split('');
            
            letters.forEach((char, index) => {
                const box = document.createElement('div');
                const isTyped = index < typedCount;
                const isNext = index === typedCount;

                box.className = `letter-box relative w-14 h-18 md:w-16 md:h-22 rounded-2xl flex items-center justify-center text-4xl md:text-5xl font-black uppercase border-b-[10px] transition-all duration-300`;
                
                if (isTyped) {
                    box.classList.add('bg-gradient-to-b', 'from-green-400', 'to-green-500', 'text-white', 'border-green-700', '-translate-y-2');
                } else {
                    box.classList.add('bg-slate-100', 'text-slate-300', 'border-slate-200');
                }

                if (isNext) {
                    box.classList.add('ring-4', 'ring-indigo-300', 'ring-offset-4', 'ring-offset-white');
                    const zap = document.createElement('div');
                    zap.className = 'absolute -bottom-14 animate-bounce';
                    zap.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="gold"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;
                    box.appendChild(zap);
                }

                box.innerText = char;
                wordContainer.appendChild(box);
            });
        }

        function handleLanguageToggle() {
            currentLang = currentLang === 'en' ? 'he' : 'en';
            
            if (currentLang === 'he') {
                bodyBg.classList.replace('bg-indigo-50', 'bg-rose-50');
                bodyBg.classList.add('rtl');
                langText.innerText = 'לעבור לאנגלית';
                skipText.innerText = 'מילה חדשה';
                helperText.innerText = 'מצא את המקשים במקלדת שלך';
                successMsg.innerText = 'כל הכבוד!';
                loaderText.innerText = 'מצייר...';
                wordContainer.classList.add('flex-row-reverse');
            } else {
                bodyBg.classList.replace('bg-rose-50', 'bg-indigo-50');
                bodyBg.classList.remove('rtl');
                langText.innerText = 'Switch to Hebrew';
                skipText.innerText = 'SKIP WORD';
                helperText.innerText = 'Find the keys on your keyboard';
                successMsg.innerText = 'AMAZING!';
                loaderText.innerText = 'Thinking...';
                wordContainer.classList.remove('flex-row-reverse');
            }
            
            startNewWord();
        }

        function addAchievementDot() {
            const dot = document.createElement('div');
            dot.className = 'w-3 h-3 rounded-full bg-indigo-500 animate-pulse shadow-sm';
            dotsContainer.appendChild(dot);
            
            // Limit dots shown
            if (dotsContainer.children.length > 50) {
                dotsContainer.removeChild(dotsContainer.firstChild);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (isSuccess || isLoading || !currentWordObj) return;

            const key = e.key;
            const targetChar = currentWordObj.word[typedCount];

            // Case insensitive comparison for English, exact for Hebrew
            if (key.toLowerCase() === targetChar.toLowerCase()) {
                typedCount++;
                renderWord();

                if (typedCount === currentWordObj.word.length) {
                    isSuccess = true;
                    score++;
                    scoreDisplay.innerText = score;
                    successOverlay.classList.remove('hidden');
                    addAchievementDot();
                    
                    setTimeout(() => {
                        startNewWord();
                    }, 2000);
                }
            }
        });

        langToggle.addEventListener('click', handleLanguageToggle);
        skipBtn.addEventListener('click', () => startNewWord());

        // Initialize
        window.onload = () => {
            startNewWord();
        };
    </script>
</body>
</html>
