<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Typing Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        .rtl { direction: rtl; }
        .ltr { direction: ltr; }
        .letter-box { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .key-transition { transition: all 0.2s ease-in-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s ease-out; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex flex-col items-center justify-center p-4 md:p-8 select-none transition-colors duration-500 ltr" id="body-bg">

    <!-- Header -->
    <div class="w-full max-w-2xl flex justify-between items-center mb-6 bg-white/80 backdrop-blur-md p-4 rounded-3xl shadow-lg border border-white">
        <button id="lang-toggle" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-2xl font-bold shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            <span id="lang-text">Switch to Hebrew</span>
        </button>
        <div class="flex items-center gap-3 bg-amber-400 text-amber-900 px-6 py-2.5 rounded-2xl font-black text-xl border-b-4 border-amber-600 shadow-md">
            <span>Score: <span id="score-display">0</span></span>
        </div>
    </div>

    <!-- Main Game Card -->
    <div id="game-card" class="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl p-6 md:p-8 flex flex-col items-center relative border-b-[16px] border-slate-200 overflow-hidden transition-colors duration-300">
        
        <!-- Keyboard Language Warning Toast -->
        <div id="keyboard-warning" class="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-full opacity-0 bg-red-500 text-white px-6 py-2 rounded-b-2xl font-bold text-sm shadow-md transition-all duration-300 flex items-center gap-2 z-50 whitespace-nowrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="warning-text"></span>
        </div>

        <!-- Success State -->
        <div id="success-overlay" class="absolute inset-0 bg-emerald-500 flex flex-col items-center justify-center z-40 text-white hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="yellow" stroke="yellow" class="mb-4 animate-bounce"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <h2 id="success-msg" class="text-6xl font-black tracking-tighter italic drop-shadow-lg">AMAZING!</h2>
        </div>

        <!-- Image -->
        <div class="w-full aspect-square max-w-[240px] md:max-w-[280px] bg-indigo-50/50 rounded-[2.5rem] mb-6 flex items-center justify-center relative overflow-hidden shadow-inner">
            <img id="word-image" alt="word" class="w-full h-full object-contain p-6 transition-opacity duration-300 opacity-0">
        </div>

        <!-- Word Boxes -->
        <div id="word-container" class="flex flex-wrap justify-center gap-3 md:gap-4 mb-8"></div>

        <!-- Virtual Keyboard -->
        <div id="virtual-keyboard" class="flex flex-col gap-1.5 md:gap-2 mb-4 w-full items-center" dir="ltr">
            <!-- Keys injected via JS -->
        </div>

        <div class="bg-slate-50 px-6 py-2.5 rounded-2xl text-slate-400 text-xs font-bold uppercase tracking-widest border border-slate-100">
            <span id="helper-text">Find the keys on your keyboard</span>
        </div>
    </div>

    <!-- Actions -->
    <button id="skip-btn" class="mt-6 bg-white hover:bg-slate-50 text-slate-500 px-10 py-4 rounded-3xl font-black shadow-lg border-2 border-slate-100 transition-all active:scale-95">
        <span id="skip-text">SKIP WORD</span>
    </button>

    <!-- Progress Tracker -->
    <div id="dots-container" class="mt-auto py-8 flex gap-2 flex-wrap justify-center max-w-xl opacity-40"></div>

    <script>
        // Word lists strictly matching the order in generator.html
        const WORD_DATABASE = {
            en: [
                "apple", "bear", "cat", "dog", "duck", "elephant", "fish", "frog", "goat", "horse", "lion", "mouse", "owl", "pig", "rabbit", "shark", "snake", "tiger", "whale", "zebra", "bird", "sheep", "monkey", "giraffe", "turtle", "panda", "crab", "bee", "ant", "camel", "ball", "bike", "boat", "book", "box", "cake", "car", "chair", "cloud", "cup", "door", "drum", "egg", "fire", "flower", "fork", "gift", "glass", "hat", "house", "ice", "jar", "key", "kite", "lamp", "leaf", "milk", "moon", "net", "nose", "pen", "plane", "rain", "ring", "road", "rock", "rope", "ship", "shoe", "sky", "snow", "soap", "spoon", "star", "sun", "table", "tent", "toy", "train", "tree", "van", "vest", "watch", "wind", "yard", "yoyo"
            ],
            he: [
                "אריה", "דוב", "חתול", "כלב", "פיל", "גמל", "חמור", "סוס", "פרה", "כבשה", "עז", "תרנגול", "ברווז", "ציפור", "נשר", "ינשוף", "נחש", "צב", "צפרדע", "דג", "לוויתן", "כריש", "קוף", "זברה", "ארנב", "עכבר", "נמלה", "דבורה", "פרפר", "עכביש", "בית", "כדור", "שמש", "ענן", "עץ", "פרח", "מים", "לחם", "חלב", "גבינה", "תפוח", "בננה", "ענבים", "לימון", "אבטיח", "גלידה", "ספר", "מכתב", "שולחן", "כיסא", "מיטה", "חלון", "דלת", "מפתח", "מנורה", "טלפון", "שעון", "בובה", "רכבת", "מטוס", "סירה", "אוטו", "אופניים", "כובע", "חולצה", "מכנס", "נעל", "גרב", "תיק", "כסף", "סכין", "כף", "צלחת", "כוס", "מלח", "סוכר", "דבש", "ביצה", "מרק", "אורז", "ירח", "כוכב", "אבן", "חול", "ים", "נהר"
            ]
        };

        const KEYBOARD_LAYOUTS = {
            en: [
                ['q','w','e','r','t','y','u','i','o','p'],
                ['a','s','d','f','g','h','j','k','l'],
                ['z','x','c','v','b','n','m']
            ],
            he: [
                ['ק','ר','א','ט','ו','ן','ם','פ'],
                ['ש','ד','ג','כ','ע','י','ח','ל','ך','ף'],
                ['ז','ס','ב','ה','נ','מ','צ','ת','ץ']
            ]
        };

        let currentLang = 'en';
        let currentWordIndex = -1;
        let typedCount = 0;
        let score = 0;
        let isSuccess = false;
        let warningTimeout;
        let hintTimer = null;
        let highlightedKey = null;

        const bodyBg = document.getElementById('body-bg');
        const langToggle = document.getElementById('lang-toggle');
        const langText = document.getElementById('lang-text');
        const scoreDisplay = document.getElementById('score-display');
        const wordImage = document.getElementById('word-image');
        const wordContainer = document.getElementById('word-container');
        const virtualKeyboard = document.getElementById('virtual-keyboard');
        const successOverlay = document.getElementById('success-overlay');
        const successMsg = document.getElementById('success-msg');
        const skipText = document.getElementById('skip-text');
        const helperText = document.getElementById('helper-text');
        const dotsContainer = document.getElementById('dots-container');
        const gameCard = document.getElementById('game-card');
        const keyboardWarning = document.getElementById('keyboard-warning');
        const warningText = document.getElementById('warning-text');

        wordImage.onerror = function() { handleImageError(this); };

        function handleImageError(img) {
            if (img.dataset.error === "true") return;
            console.error("Failed to load image at:", img.src);
            img.dataset.error = "true";
            img.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
                    <rect width="100%" height="100%" fill="#f1f5f9"/>
                    <text x="50%" y="50%" font-family="sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle" dy=".3em">
                        Image Missing (${img.src.split('/').pop()})
                    </text>
                </svg>
            `)}`;
        }

        function showKeyboardWarning(msg) {
            warningText.innerText = msg;
            keyboardWarning.classList.remove('-translate-y-full', 'opacity-0');
            keyboardWarning.classList.add('translate-y-0', 'opacity-100');
            clearTimeout(warningTimeout);
            warningTimeout = setTimeout(hideKeyboardWarning, 3500);
        }

        function hideKeyboardWarning() {
            keyboardWarning.classList.remove('translate-y-0', 'opacity-100');
            keyboardWarning.classList.add('-translate-y-full', 'opacity-0');
        }

        function renderKeyboard() {
            virtualKeyboard.innerHTML = '';
            const layout = KEYBOARD_LAYOUTS[currentLang];
            
            layout.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex justify-center gap-1 md:gap-1.5 w-full';
                
                row.forEach(char => {
                    const keyEl = document.createElement('div');
                    keyEl.id = `vk-${char}`;
                    keyEl.className = 'w-7 h-9 md:w-9 md:h-11 bg-slate-100 rounded-lg flex items-center justify-center font-bold text-slate-500 uppercase text-sm md:text-base border-b-4 border-slate-200 key-transition shadow-sm';
                    keyEl.innerText = char;
                    rowDiv.appendChild(keyEl);
                });
                
                virtualKeyboard.appendChild(rowDiv);
            });
        }

        function clearHint() {
            if (hintTimer) clearTimeout(hintTimer);
            if (highlightedKey) {
                highlightedKey.classList.remove('bg-yellow-400', 'border-yellow-500', 'text-yellow-900', 'animate-pulse', 'scale-110', 'z-10');
                highlightedKey.classList.add('bg-slate-100', 'border-slate-200', 'text-slate-500');
                highlightedKey = null;
            }
        }

        function startHintTimer() {
            clearHint();
            if (isSuccess) return;

            hintTimer = setTimeout(() => {
                const targetWord = WORD_DATABASE[currentLang][currentWordIndex];
                if (typedCount < targetWord.length) {
                    const targetChar = targetWord[typedCount].toLowerCase();
                    const keyEl = document.getElementById(`vk-${targetChar}`);
                    
                    if (keyEl) {
                        keyEl.classList.remove('bg-slate-100', 'border-slate-200', 'text-slate-500');
                        keyEl.classList.add('bg-yellow-400', 'border-yellow-500', 'text-yellow-900', 'animate-pulse', 'scale-110', 'z-10');
                        highlightedKey = keyEl;
                    }
                }
            }, 5000);
        }

        function startNewWord() {
            const list = WORD_DATABASE[currentLang];
            let newIndex = Math.floor(Math.random() * list.length);
            
            if (newIndex === currentWordIndex && list.length > 1) {
                newIndex = (newIndex + 1) % list.length;
            }

            currentWordIndex = newIndex;
            typedCount = 0;
            isSuccess = false;
            
            successOverlay.classList.add('hidden');
            hideKeyboardWarning();
            gameCard.classList.remove('border-emerald-600');
            gameCard.classList.add('border-slate-200');
            
            const suffix = currentLang === 'en' ? 'eng' : 'heb';
            const fileName = `${currentWordIndex + 1}-${suffix}.png`;
            const imagePath = `./images/${fileName}`;
            
            wordImage.dataset.error = "false";
            wordImage.style.opacity = '0';
            wordImage.onload = () => wordImage.style.opacity = '1';
            wordImage.src = imagePath;
            
            renderWord();
            startHintTimer();
        }

        function renderWord() {
            wordContainer.innerHTML = '';
            const word = WORD_DATABASE[currentLang][currentWordIndex];
            const letters = word.split('');
            
            letters.forEach((char, index) => {
                const box = document.createElement('div');
                const isTyped = index < typedCount;
                const isNext = index === typedCount;

                box.className = `letter-box relative w-12 h-16 md:w-16 md:h-20 rounded-2xl flex items-center justify-center text-3xl md:text-5xl font-black uppercase border-b-[8px] md:border-b-[10px] shadow-sm`;
                
                if (isTyped) {
                    box.classList.add('bg-green-500', 'text-white', 'border-green-700', '-translate-y-2', 'animate-pop');
                } else {
                    box.classList.add('bg-slate-100', 'text-slate-300', 'border-slate-200');
                }

                if (isNext) {
                    box.classList.add('ring-4', 'ring-indigo-300', 'ring-offset-4', 'ring-offset-white');
                    const zap = document.createElement('div');
                    zap.className = 'absolute -bottom-10 md:-bottom-14 animate-bounce';
                    zap.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="gold"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;
                    box.appendChild(zap);
                }

                box.innerText = char;
                wordContainer.appendChild(box);
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'he' : 'en';
            
            if (currentLang === 'he') {
                bodyBg.classList.replace('bg-indigo-50', 'bg-rose-50');
                bodyBg.classList.replace('ltr', 'rtl');
                langText.innerText = 'לעבור לאנגלית';
                skipText.innerText = 'מילה חדשה';
                helperText.innerText = 'מצא את המקשים במקלדת שלך';
                successMsg.innerText = 'כל הכבוד!';
            } else {
                bodyBg.classList.replace('bg-rose-50', 'bg-indigo-50');
                bodyBg.classList.replace('rtl', 'ltr');
                langText.innerText = 'Switch to Hebrew';
                skipText.innerText = 'SKIP WORD';
                helperText.innerText = 'Find the keys on your keyboard';
                successMsg.innerText = 'AMAZING!';
            }
            
            renderKeyboard();
            startNewWord();
        }

        function addAchievementDot() {
            const dot = document.createElement('div');
            dot.className = 'w-3 h-3 rounded-full bg-indigo-500 animate-pulse';
            dotsContainer.appendChild(dot);
            if (dotsContainer.children.length > 40) dotsContainer.removeChild(dotsContainer.firstChild);
        }

        window.addEventListener('keydown', (e) => {
            if (isSuccess || currentWordIndex === -1) return;
            
            if (e.key.length !== 1) return;

            const targetWord = WORD_DATABASE[currentLang][currentWordIndex];
            const targetChar = targetWord[typedCount];

            // Reset the hint timer upon any character key press
            startHintTimer();

            if (e.key.toLowerCase() === targetChar.toLowerCase()) {
                hideKeyboardWarning();
                typedCount++;
                renderWord();

                // Animate the virtual key briefly for positive feedback
                const pressedKeyEl = document.getElementById(`vk-${e.key.toLowerCase()}`);
                if (pressedKeyEl) {
                    pressedKeyEl.classList.add('bg-indigo-100', 'scale-90');
                    setTimeout(() => pressedKeyEl.classList.remove('bg-indigo-100', 'scale-90'), 150);
                }

                if (typedCount === targetWord.length) {
                    isSuccess = true;
                    clearHint(); // ensure hint doesn't pop up after win
                    score++;
                    scoreDisplay.innerText = score;
                    
                    successOverlay.classList.remove('hidden');
                    gameCard.classList.remove('border-slate-200');
                    gameCard.classList.add('border-emerald-600');
                    
                    addAchievementDot();
                    setTimeout(startNewWord, 2000);
                }
            } else {
                const isEnglishChar = /^[a-zA-Z]$/.test(e.key);
                const isHebrewChar = /^[\u0590-\u05FF]$/.test(e.key);

                if (currentLang === 'en' && isHebrewChar) {
                    showKeyboardWarning('Please switch your keyboard to English!');
                } else if (currentLang === 'he' && isEnglishChar) {
                    showKeyboardWarning('נא להעביר את המקלדת לעברית!');
                }
            }
        });

        langToggle.addEventListener('click', toggleLanguage);
        document.getElementById('skip-btn').addEventListener('click', startNewWord);

        window.onload = () => {
            renderKeyboard();
            startNewWord();
        };
    </script>
</body>
</html>
